<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OceanCrest Security Dashboard</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="handbook-security.css" />
    <style>
      .dashboard-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 2rem;
      }

      .dashboard-header {
        text-align: center;
        margin-bottom: 3rem;
        padding: 2rem;
        background: var(--glass-bg);
        border-radius: 20px;
        border: 1px solid var(--border-color);
      }

      .dashboard-title {
        background: var(--accent-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-size: 2.5rem;
        font-weight: 700;
        margin-bottom: 1rem;
      }

      .dashboard-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 2rem;
        margin-bottom: 2rem;
      }

      .dashboard-card {
        background: var(--glass-bg);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 2rem;
        backdrop-filter: blur(20px);
      }

      .card-title {
        color: var(--accent-blue);
        font-size: 1.3rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .status-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      .status-item {
        padding: 1rem;
        background: var(--secondary-bg);
        border-radius: 10px;
        text-align: center;
      }

      .status-value {
        font-size: 1.5rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .status-label {
        color: var(--text-muted);
        font-size: 0.9rem;
      }

      .log-container {
        max-height: 300px;
        overflow-y: auto;
        background: var(--primary-bg);
        border-radius: 10px;
        padding: 1rem;
      }

      .log-entry {
        padding: 0.5rem;
        margin-bottom: 0.5rem;
        background: var(--secondary-bg);
        border-radius: 5px;
        font-family: 'Courier New', monospace;
        font-size: 0.8rem;
        border-left: 3px solid var(--accent-blue);
      }

      .log-entry.warning {
        border-left-color: var(--warning-color);
      }

      .log-entry.error {
        border-left-color: #ff4444;
      }

      .log-timestamp {
        color: var(--text-muted);
      }

      .threat-meter {
        position: relative;
        height: 20px;
        background: var(--secondary-bg);
        border-radius: 10px;
        overflow: hidden;
        margin: 1rem 0;
      }

      .threat-fill {
        height: 100%;
        background: linear-gradient(90deg, #00ff88, #ffa500, #ff4444);
        width: 0%;
        transition: width 0.5s ease;
        border-radius: 10px;
      }

      .access-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .access-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.8rem;
        background: var(--secondary-bg);
        border-radius: 8px;
      }

      .access-status {
        padding: 0.2rem 0.6rem;
        border-radius: 12px;
        font-size: 0.8rem;
        font-weight: 600;
      }

      .access-active {
        background: rgba(0, 255, 136, 0.2);
        color: var(--success-color);
      }

      .access-expired {
        background: rgba(255, 68, 68, 0.2);
        color: var(--warning-color);
      }

      .controls-section {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
      }

      .control-btn {
        padding: 0.8rem 1.5rem;
        border: none;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .control-btn.danger {
        background: linear-gradient(135deg, #ff4444, #cc0000);
        color: white;
      }

      .control-btn.warning {
        background: linear-gradient(135deg, #ffa500, #cc8800);
        color: white;
      }

      .control-btn.success {
        background: linear-gradient(135deg, #00ff88, #00cc66);
        color: white;
      }

      @media (max-width: 768px) {
        .dashboard-grid {
          grid-template-columns: 1fr;
        }
        
        .status-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-container">
          <a href="index.html" class="logo">OceanCrest</a>
          <nav class="desktop-nav">
            <ul>
              <li><a href="handbooks.html">← Back to Handbooks</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>

    <main class="section" style="padding-top: 6rem;">
      <div class="dashboard-container">
        <div class="dashboard-header">
          <h1 class="dashboard-title">🛡️ Security Dashboard</h1>
          <p style="color: var(--text-muted);">Real-time monitoring and security analytics</p>
        </div>

        <div class="dashboard-grid">
          <div class="dashboard-card">
            <h3 class="card-title">🔒 System Status</h3>
            <div class="status-grid">
              <div class="status-item">
                <div class="status-value" id="threatLevel">0</div>
                <div class="status-label">Threat Level</div>
              </div>
              <div class="status-item">
                <div class="status-value" id="activeSessions">0</div>
                <div class="status-label">Active Sessions</div>
              </div>
              <div class="status-item">
                <div class="status-value" id="totalEvents">0</div>
                <div class="status-label">Security Events</div>
              </div>
              <div class="status-item">
                <div class="status-value" id="bannedIPs">0</div>
                <div class="status-label">Banned IPs</div>
              </div>
            </div>
            <div class="threat-meter">
              <div class="threat-fill" id="threatMeter"></div>
            </div>
          </div>

          <div class="dashboard-card">
            <h3 class="card-title">📊 Access Control</h3>
            <div class="access-list" id="accessList">
              <!-- Dynamic content -->
            </div>
          </div>

          <div class="dashboard-card">
            <h3 class="card-title">🔧 Security Controls</h3>
            <div class="controls-section">
              <button class="control-btn danger" onclick="clearAllSessions()">Clear All Sessions</button>
              <button class="control-btn warning" onclick="resetThreatLevel()">Reset Threat Level</button>
              <button class="control-btn success" onclick="exportLogs()">Export Logs</button>
              <button class="control-btn warning" onclick="unbanAllIPs()">Unban All IPs</button>
            </div>
          </div>

          <div class="dashboard-card" style="grid-column: 1 / -1;">
            <h3 class="card-title">📝 Security Logs</h3>
            <div class="log-container" id="securityLogs">
              <!-- Dynamic content -->
            </div>
          </div>
        </div>
      </div>
    </main>

    <script src="app.js"></script>
    <script src="handbook-security.js"></script>
    <script>
      class SecurityDashboard {
        constructor() {
          this.refreshInterval = null;
          this.init();
        }

        init() {
          this.updateDashboard();
          this.startAutoRefresh();
        }

        updateDashboard() {
          if (!window.advancedSecurity) {
            console.log('Security system not loaded');
            return;
          }

          const security = window.advancedSecurity;
          
          // Update threat level
          document.getElementById('threatLevel').textContent = security.threatLevel;
          document.getElementById('threatMeter').style.width = `${security.threatLevel}%`;
          
          // Update statistics
          document.getElementById('totalEvents').textContent = security.securityLogs.length;
          document.getElementById('bannedIPs').textContent = security.bannedIPs.size;
          
          // Update active sessions
          const activeSessions = this.countActiveSessions();
          document.getElementById('activeSessions').textContent = activeSessions;
          
          // Update access list
          this.updateAccessList();
          
          // Update security logs
          this.updateSecurityLogs();
        }

        countActiveSessions() {
          const handbooks = ['executive', 'internal', 'logs', 'project', 'hr'];
          let count = 0;
          
          handbooks.forEach(handbook => {
            const access = sessionStorage.getItem(`handbook_${handbook}_access`);
            if (access === 'granted') count++;
          });
          
          return count;
        }

        updateAccessList() {
          const accessList = document.getElementById('accessList');
          const handbooks = [
            { name: 'Executive', key: 'executive' },
            { name: 'Internal', key: 'internal' },
            { name: 'Logs', key: 'logs' },
            { name: 'Project', key: 'project' },
            { name: 'HR', key: 'hr' }
          ];
          
          accessList.innerHTML = '';
          
          handbooks.forEach(handbook => {
            const access = sessionStorage.getItem(`handbook_${handbook.key}_access`);
            const timestamp = sessionStorage.getItem(`handbook_${handbook.key}_timestamp`);
            
            const item = document.createElement('div');
            item.className = 'access-item';
            
            let statusClass = 'access-expired';
            let statusText = 'No Access';
            
            if (access === 'granted') {
              const accessTime = parseInt(timestamp);
              const currentTime = Date.now();
              if (currentTime - accessTime < 30 * 60 * 1000) {
                statusClass = 'access-active';
                statusText = 'Active';
              } else {
                statusText = 'Expired';
              }
            }
            
            item.innerHTML = `
              <span>${handbook.name} Handbook</span>
              <span class="access-status ${statusClass}">${statusText}</span>
            `;
            
            accessList.appendChild(item);
          });
        }

        updateSecurityLogs() {
          const logsContainer = document.getElementById('securityLogs');
          
          if (!window.advancedSecurity || !window.advancedSecurity.securityLogs) {
            logsContainer.innerHTML = '<div class="log-entry">No security logs available</div>';
            return;
          }
          
          const logs = window.advancedSecurity.securityLogs.slice(-20).reverse();
          
          logsContainer.innerHTML = '';
          
          logs.forEach(log => {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            
            if (log.type.includes('THREAT') || log.type.includes('FAILURE')) {
              entry.classList.add('warning');
            }
            if (log.type.includes('BANNED') || log.type.includes('DENIED')) {
              entry.classList.add('error');
            }
            
            const time = new Date(log.timestamp).toLocaleTimeString();
            entry.innerHTML = `
              <span class="log-timestamp">[${time}]</span>
              <strong>${log.type}:</strong> ${log.description}
              ${log.threatLevel > 0 ? ` (Threat: ${log.threatLevel})` : ''}
            `;
            
            logsContainer.appendChild(entry);
          });
          
          if (logs.length === 0) {
            logsContainer.innerHTML = '<div class="log-entry">No recent security events</div>';
          }
        }

        startAutoRefresh() {
          this.refreshInterval = setInterval(() => {
            this.updateDashboard();
          }, 5000); // Update every 5 seconds
        }

        stopAutoRefresh() {
          if (this.refreshInterval) {
            clearInterval(this.refreshInterval);
          }
        }
      }

      // Security control functions
      function clearAllSessions() {
        const handbooks = ['executive', 'internal', 'logs', 'project', 'hr'];
        handbooks.forEach(handbook => {
          sessionStorage.removeItem(`handbook_${handbook}_access`);
          sessionStorage.removeItem(`handbook_${handbook}_token`);
          sessionStorage.removeItem(`handbook_${handbook}_timestamp`);
        });
        
        if (window.advancedSecurity) {
          window.advancedSecurity.logSecurityEvent('ADMIN_ACTION', 'All sessions cleared via dashboard');
        }
        
        alert('All active sessions have been cleared.');
        dashboard.updateDashboard();
      }

      function resetThreatLevel() {
        if (window.advancedSecurity) {
          window.advancedSecurity.threatLevel = 0;
          window.advancedSecurity.logSecurityEvent('ADMIN_ACTION', 'Threat level reset via dashboard');
        }
        
        alert('Threat level has been reset to 0.');
        dashboard.updateDashboard();
      }

      function exportLogs() {
        if (!window.advancedSecurity || !window.advancedSecurity.securityLogs) {
          alert('No security logs available for export.');
          return;
        }
        
        const logs = window.advancedSecurity.securityLogs;
        const logData = JSON.stringify(logs, null, 2);
        
        const blob = new Blob([logData], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        
        const a = document.createElement('a');
        a.href = url;
        a.download = `oceancrest-security-logs-${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        URL.revokeObjectURL(url);
        
        if (window.advancedSecurity) {
          window.advancedSecurity.logSecurityEvent('ADMIN_ACTION', 'Security logs exported');
        }
      }

      function unbanAllIPs() {
        if (window.advancedSecurity) {
          window.advancedSecurity.bannedIPs.clear();
          window.advancedSecurity.failedAttempts.clear();
          window.advancedSecurity.logSecurityEvent('ADMIN_ACTION', 'All IP bans cleared via dashboard');
        }
        
        alert('All IP bans have been cleared.');
        dashboard.updateDashboard();
      }

      // Initialize dashboard
      let dashboard;
      document.addEventListener('DOMContentLoaded', () => {
        dashboard = new SecurityDashboard();
      });

      // Clean up on page unload
      window.addEventListener('beforeunload', () => {
        if (dashboard) {
          dashboard.stopAutoRefresh();
        }
      });
    </script>
  </body>
</html>
